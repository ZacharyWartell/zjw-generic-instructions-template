  <script type="module" lang="javascript">
    import * as ZxW_GUI from "ZxW_GUI";
    import * as Rubric from "./modules/zjw-generic-instructions/scripts/Rubric.js";
    import * as CAW from "./modules/zjw-generic-instructions/scripts/ClassAssignmentWartell.js";

    //const DEV_BUILD = true;
    const DEV_BUILD=false;

    class App extends ZxW_GUI.DefaultApplication {
      constructor() { super(); }
    }
    let app = new App()
    await ZxW_GUI.DefaultApplication.fetchUserDocument(app, "main.zxw-doc.html");

    window.BreadCrumb = Rubric.BreadCrumb;
    CAW.main(200, !DEV_BUILD, 2);


    window.Visibility_Toggle = CAW.Visibility_Toggle;
    console.log("window.rubricMain");

    document.getElementById("fileMenu").disabled = false;
    document.getElementById("Instructor_Mode").addEventListener('change', (e) => {
      Visibility_Toggle('Instructor_Mode', e.target.checked); Visibility_Toggle('Staff_Only', e.target.checked); document.getElementById("fileMenu").disabled
        = !e.target.checked;
    });
    //function onload_Body() { console.log("function onload_Body()");}
    //window.onload_Body = onload_Body;

    if (DEV_BUILD) {
      const c = document.getElementById("cursor");
      if (c !== null) c.scrollIntoView();
    }

    if (false)
      window.addEventListener("popstate", (event) => {
        //alert(
        //  `location: ${document.location}, state: ${JSON.stringify(event.state)}`,
        //);
        const s = document.location.toString().split('#');
        if (s.length == 2) {
          console.log(s[1]);
          const id = document.getElementById(s[1]);
          console.log("id:", id);
          if (id !== null)
            id.scrollIntoView();
          else {
            const mc = document.querySelector("article");
            console.log("mc 1:" + mc);
            mc.scrollIntoView();
          }
        } else {
          const mc = document.querySelector("article");
          console.log("mc 2:" + mc + mc.classList);
          mc.scrollIntoView({ behavior: "instant", block: "start" });
        }

        console.log(
          `location: ${document.location}, state: ${JSON.stringify(event.state)}`
        );
      });
  </script>
